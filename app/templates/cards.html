<!-- templates/cards.html -->

<!-- Все категории -->
<section class="section" aria-labelledby="all-categories-header">
  <div class="cards-grid">
    {% for card in all_groups %}
      <article class="card">
        <div class="card-image-wrapper">
          <img src="{{ url_for('static', path='/images/' + card.image) }}"
               alt="{{ card.name }}"
               class="card-image"
               loading="lazy">
        </div>
        <div class="card-content">
          <h3 class="card-title">{{ card.name | safe }}</h3>
          <p class="card-text">{{ card.description }}</p>
          <div class="card-actions">
            <button class="btn btn-primary"
                    data-count="{{ card.questions_count }}"
                    onclick="navigateToQuestions({{ card.id }})">
              <span class="questions-count-text"></span>
            </button>
          </div>
        </div>
      </article>
    {% endfor %}
  </div>
</section>

<script>
  function navigateToQuestions(groupId) {
    window.location.href = `/questions?group_id=${groupId}`;
  }

  // Склонение числительных в русском языке
  function pluralRu(n, forms) {
    // forms: [1, 2-4, 5-20]
    // Пример: ['вопрос', 'вопроса', 'вопросов']
    n = Math.abs(n) % 100;
    const n1 = n % 10;

    if (n >= 11 && n <= 19) return forms[2];
    if (n1 === 1) return forms[0];
    if (n1 >= 2 && n1 <= 4) return forms[1];
    return forms[2];
  }

  // Обновление текста в элементе по количеству
  function updateQuestionsText(element, count) {
    const textEl = element.querySelector('.questions-count-text');
    if (!textEl) return;
    textEl.textContent = `${count} ${pluralRu(count, ['вопрос', 'вопроса', 'вопросов'])}`;
    element.dataset.count = count;
  }

  // Инициализация при загрузке страницы
  document.addEventListener('DOMContentLoaded', function () {
    // Обработка кнопок с количеством вопросов
    document.querySelectorAll('button[data-count]').forEach(btn => {
      const count = parseInt(btn.dataset.count, 10);
      if (!isNaN(count)) updateQuestionsText(btn, count);
    });

    // Добавляем класс 'loaded' к изображениям после их загрузки
    const images = document.querySelectorAll('.card-image');
    images.forEach(function (img) {
      if (img.complete) {
        img.classList.add('loaded');
      } else {
        img.addEventListener('load', function () {
          this.classList.add('loaded');
        });
        img.addEventListener('error', function () {
          this.classList.add('loaded');
        });
      }
    });
  });

  // Экспортируем функции глобально, чтобы их можно было вызывать
  // при динамическом изменении количества вопросов извне
  window.updateQuestionsText = updateQuestionsText;
  window.pluralRu = pluralRu;
</script>

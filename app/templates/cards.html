<!-- templates/cards.html -->

<!-- Все категории -->
<section class="section" aria-labelledby="all-categories-header">
  <div class="cards-grid">
    {% for card in all_groups %}
      <article class="card">
        <div class="card-image-wrapper">
          <img src="{{ url_for('static', path='/images/' + card.image) }}"
               alt="{{ card.name }}"
               class="card-image"
               loading="lazy">
        </div>
        <div class="card-content">
          <h3 class="card-title">{{ card.name | safe }}</h3>
          <p class="card-text">{{ card.description }}</p>
          <div class="card-actions">
            <button class="btn btn-primary" onclick="navigateToQuestions({{ card.id }})">{{ card.questions_count }} вопросов</button>
          </div>
        </div>
      </article>
    {% endfor %}
  </div>
</section>

<script>
  function navigateToQuestions(groupId) {
    window.location.href = `/questions?group_id=${groupId}`;
  }

  // Добавляем класс 'loaded' к изображениям после их загрузки
  document.addEventListener('DOMContentLoaded', function() {
    const images = document.querySelectorAll('.card-image');
    
    images.forEach(function(img) {
      // Если изображение уже загружено (из кэша)
      if (img.complete) {
        img.classList.add('loaded');
      } else {
        // Добавляем класс когда изображение загрузится
        img.addEventListener('load', function() {
          this.classList.add('loaded');
        });
        
        // На случай ошибки загрузки - тоже показываем изображение
        img.addEventListener('error', function() {
          this.classList.add('loaded');
        });
      }
    });
  });
</script>

<!-- templates/sidebar_questions.html -->
<div class="sidebar-header">
  <h1 class="sidebar-title">База вопросов</h1>
  <p class="sidebar-subtitle">IT обучение и подготовка</p>
</div>

<div class="sidebar-section">
  <h2 class="section-title">Группы вопросов</h2>
  <div class="nav-list">
    <a href="/questions" class="nav-item" tabindex="0">Все вопросы</a>
    {% for group in groups %}
    <a href="/questions?group_id={{ group.id }}" class="nav-item" tabindex="0">{{ group.name }}</a>
    {% endfor %}
  </div>
</div>

<div class="sidebar-section">
  <h2 class="section-title">Быстрый доступ</h2>
  <div class="nav-list">
    <a href="/" class="nav-item" tabindex="0">Главная страница</a>
    <a href="/questions" class="nav-item" tabindex="0">Все вопросы</a>
    {% if is_admin %}
    <a href="/add-question" class="nav-item" tabindex="0">Добавить вопрос</a>
    <a href="/manage-questions" class="nav-item" tabindex="0">Управление вопросами</a>
    {% endif %}
  </div>
</div>

<div class="footer-note">Хочу в IT</div>

<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#C9DEFA" />
  <meta name="description" content="База вопросов для изучения IT технологий" />
  <title>{% block title %}База вопросов - IT обучение{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Ubuntu:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
  <style>
    .progress-badge { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .status-know { background-color: #28a745; color: white; }
    .status-almost-know { background-color: #ffc107; color: black; }
    .status-dont-know { background-color: #dc3545; color: white; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .progress-bar-container { margin-top: 10px; }
    .overall-progress { height: 10px; border-radius: 5px; background-color: #e9ecef; overflow: hidden; }
    .overall-progress-fill { height: 100%; transition: width 0.3s ease; }
  </style>
</head>
<body>
  <div class="page">
    <div class="overlay" id="overlay"></div>

    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Открыть меню" aria-expanded="false" aria-controls="sidebar">
      <svg class="menu-icon" width="28" height="20" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="1" fill="var(--color-black-solid, black)"/>
        <rect y="8" width="28" height="1" fill="var(--color-black-solid, black)"/>
        <rect y="16" width="28" height="1" fill="var(--color-black-solid, black)"/>
      </svg>
      <svg class="close-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <path d="M1 1L19 19M19 1L1 19" stroke="var(--color-black-solid)" stroke-width="2"/>
      </svg>
    </button>

    <nav class="sidebar" id="sidebar" aria-label="Основная навигация">
      {% include 'sidebar.html' %}
    </nav>

    <main id="mainContent">
      {% block content %}
      {% include 'cards.html' %}
      {% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', path='/js/main.js') }}"></script>
  <script>
    // Глобальная переменная для хранения текущего пользователя
    let currentUser = {{ 'null' if not current_user else '{"username": "' ~ current_user.username ~ '"}' }};
    
    // Проверка авторизации - больше не перенаправляем автоматически
    function checkAuth() {
      const token = localStorage.getItem('access_token');
      return token;
    }
    
    // Добавляем токен ко всем запросам
    async function fetchWithAuth(url, options = {}) {
      const token = localStorage.getItem('access_token');
      if (!options.headers) {
        options.headers = {};
      }
      if (token) {
        options.headers['Authorization'] = `Bearer ${token}`;
      }
      
      const response = await fetch(url, options);
      
      // Если получили 401, перенаправляем на страницу входа
      if (response.status === 401) {
        localStorage.removeItem('access_token');
        localStorage.removeItem('token_type');
        window.location.href = '/login';
      }
      
      return response;
    }
    
    // Выход из системы
    function logout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('token_type');
      window.location.reload();
    }
    
    // Обновление UI сайдбара при входе пользователя
    async function updateSidebarAuth() {
      const token = localStorage.getItem('access_token');
      if (token && !currentUser) {
        try {
          const response = await fetchWithAuth('/api/auth/me');
          if (response.ok) {
            const user = await response.json();
            currentUser = user;
            
            // Обновляем сайдбар
            const authSection = document.querySelector('.auth-section');
            if (authSection) {
              let progressHtml = '';
              {% if progress_summary %}
              progressHtml = `
                <div class="progress-bar-container">
                  <div class="overall-progress">
                    <div class="overall-progress-fill bg-success" style="width: {{ progress_summary.know_percent }}%"></div>
                  </div>
                  <small class="text-muted">{{ progress_summary.know_count }} / {{ progress_summary.total_count }} изучено</small>
                </div>
              `;
              {% endif %}
              
              authSection.innerHTML = `
                <div class="user-info mb-2">
                  <span>👤 ${user.username}</span>
                </div>
                ${progressHtml}
                <button class="btn btn-outline-danger btn-sm mt-2 w-100" onclick="logout()">Выйти</button>
              `;
            }
            
            // Обновляем кнопки в хедере вопросов если есть
            const userActions = document.querySelector('.user-actions');
            if (userActions) {
              userActions.innerHTML = `
                <span class="user-name">${user.username}</span>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">Выйти</button>
              `;
            }
            
            // Скрываем сообщения для гостей
            document.querySelectorAll('.text-muted em').forEach(el => {
              if (el.textContent.includes('Зарегистрируйтесь или войдите')) {
                el.parentElement.style.display = 'none';
              }
            });
            
            // Показываем кнопки прогресса
            document.querySelectorAll('.progress-controls').forEach(ctrl => {
              const guestMsg = ctrl.querySelector('em');
              if (guestMsg && guestMsg.textContent.includes('Зарегистрируйтесь или войдите')) {
                ctrl.innerHTML = `
                  <p class="mb-2"><strong>Отметить свой прогресс:</strong></p>
                  <div class="btn-group" role="group">
                    <button type="button" class="btn btn-success btn-sm" onclick="setProgress(${ctrl.closest('.question-item').dataset.questionId}, 'know')">✓ Знаю</button>
                    <button type="button" class="btn btn-warning btn-sm" onclick="setProgress(${ctrl.closest('.question-item').dataset.questionId}, 'almost_know')">~ Почти знаю</button>
                    <button type="button" class="btn btn-danger btn-sm" onclick="setProgress(${ctrl.closest('.question-item').dataset.questionId}, 'dont_know')">✗ Не знаю</button>
                  </div>
                `;
              }
            });
          }
        } catch (error) {
          console.error('Ошибка проверки авторизации:', error);
        }
      }
    }
    
    // Проверяем авторизацию при загрузке страницы (без перенаправления)
    document.addEventListener('DOMContentLoaded', function() {
      checkAuth();
      updateSidebarAuth();
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
